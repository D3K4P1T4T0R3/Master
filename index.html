<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="style.css">
<body>
    <header>
        <button id="fr" class="lang_button">fr</button>
        <button id="en" class="lang_button">en</button>
    </header>
    
    <main>
        <section id="left-section">
            <h1 id="txt_titre">Portfolio</h1>
            <h2 id="txt_soustitre">David Alexandru VASILE</h2>
            <p id="txt_desc">Retrouvez toutes mes créations dans ce magnifique portfolio.</p>

            <div id="categories">
                <div id="categories-left"></div>
                <div id="categories-right"></div>
            </div>
        </section>
        <section id="right-section">
            <div id="displayer">
                <img src="assets/default.png" alt="default image"></img>
                <p>Cliquez sur un article pour voir son contenu ici.</p>
            </div>
        </section>
    </main>


    <div id="overlay">
        <button id="previous-article"> &lt; </button>
        <div id="overlay-displayer">
            <img src="assets/default.png" alt="default image"></img>
            <p>Cliquez sur un article pour voir son contenu ici.</p></div>
        <button id="next-article"> &gt; </button>
    </div>
</body>

<script src="script.js"></script>
</html>
